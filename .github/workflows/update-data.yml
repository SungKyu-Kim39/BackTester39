name: Update market data

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update cached CSV files
        run: python scripts/update_data.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update cached market data"
          file_pattern: data/*.csv data/manifest.json
